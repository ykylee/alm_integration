services:
  postgres:
    image: postgres:17
    container_name: alm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alm
      POSTGRES_USER: alm
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alm -d alm"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
